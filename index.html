<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --orange: #d29922;
            --purple: #a371f7;
            --cyan: #39c5cf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 24px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-left p {
            color: var(--text-dim);
            font-size: 14px;
        }

        .header-right {
            text-align: right;
        }

        .day-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--blue);
            color: var(--bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }

        .phase-badge {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* Top Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .stat-unit {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-dim);
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            margin-top: 8px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .stat-change.positive {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .stat-change.negative {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
        }

        .stat-change.neutral {
            background: rgba(125, 133, 144, 0.15);
            color: var(--text-dim);
        }

        /* Main Content Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
        }

        .card-badge {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(88, 166, 255, 0.1);
            color: var(--blue);
        }

        /* Weight Chart */
        .weight-chart {
            height: 200px;
            position: relative;
            margin-bottom: 16px;
        }

        .chart-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }

        .chart-bar {
            width: 40px;
            background: var(--border);
            border-radius: 4px 4px 0 0;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .chart-bar.active {
            background: var(--blue);
        }

        .chart-bar.projected {
            background: var(--border);
            opacity: 0.5;
            border: 1px dashed var(--text-dim);
        }

        .chart-bar:hover {
            filter: brightness(1.2);
        }

        .chart-value {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .chart-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        .chart-y-axis {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 20px;
            width: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
        }

        /* Line Chart */
        .line-chart-container {
            position: relative;
            height: 180px;
            margin-bottom: 16px;
        }

        .line-chart {
            width: 100%;
            height: 100%;
        }

        .chart-grid-line {
            stroke: var(--border);
            stroke-width: 1;
            stroke-dasharray: 4 4;
        }

        .chart-axis-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            fill: var(--text-dim);
        }

        .chart-line {
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chart-line.primary {
            stroke-width: 3;
        }

        .chart-line.sleep { stroke: var(--blue); }
        .chart-line.calories { stroke: var(--green); }
        .chart-line.readiness { stroke: var(--purple); }
        .chart-line.hrv { stroke: var(--cyan); }
        .chart-line.steps { stroke: var(--orange); }

        .chart-dot {
            stroke-width: 2;
            stroke: var(--surface);
        }

        .chart-dot.sleep { fill: var(--blue); }
        .chart-dot.calories { fill: var(--green); }
        .chart-dot.readiness { fill: var(--purple); }
        .chart-dot.hrv { fill: var(--cyan); }
        .chart-dot.steps { fill: var(--orange); }

        .chart-area {
            opacity: 0.1;
        }

        .chart-area.sleep { fill: var(--blue); }
        .chart-area.calories { fill: var(--green); }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .legend-item.active {
            opacity: 1;
        }

        .legend-item.primary {
            opacity: 1;
            font-weight: 600;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.sleep { background: var(--blue); }
        .legend-dot.calories { background: var(--green); }
        .legend-dot.readiness { background: var(--purple); }
        .legend-dot.hrv { background: var(--cyan); }
        .legend-dot.steps { background: var(--orange); }

        .legend-value {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            margin-left: 4px;
        }

        .oura-stats-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .oura-stat-card {
            background: var(--surface-2);
            border-radius: 8px;
            padding: 16px;
        }

        .oura-stat-card.highlight {
            border: 1px solid var(--blue);
            background: rgba(88, 166, 255, 0.05);
        }

        .oura-stat-card.highlight.calories {
            border-color: var(--green);
            background: rgba(63, 185, 80, 0.05);
        }

        .oura-stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .oura-stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
        }

        .oura-stat-value.sleep { color: var(--blue); }
        .oura-stat-value.calories { color: var(--green); }

        .oura-stat-change {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            margin-top: 4px;
        }

        /* Oura Mini Charts Grid */
        .oura-charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .oura-mini-chart {
            background: var(--surface-2);
            border-radius: 8px;
            padding: 16px;
        }

        .oura-mini-chart.primary {
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .mini-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .mini-chart-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
        }

        .mini-chart-value {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
        }

        .mini-chart-value.sleep { color: var(--blue); }
        .mini-chart-value.calories { color: var(--green); }
        .mini-chart-value.readiness { color: var(--purple); }
        .mini-chart-value.hrv { color: var(--cyan); }
        .mini-chart-value.steps { color: var(--orange); }

        .mini-line-chart {
            width: 100%;
            height: 80px;
        }

        .chart-value-label {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            fill: var(--text);
            font-weight: 500;
        }

        .gradient-stop-sleep { stop-color: var(--blue); }
        .gradient-stop-calories { stop-color: var(--green); }
        .gradient-stop-readiness { stop-color: var(--purple); }
        .gradient-stop-hrv { stop-color: var(--cyan); }
        .gradient-stop-steps { stop-color: var(--orange); }

        /* Today's Oura Stats */
        .oura-today-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }

        .oura-today-stat {
            background: var(--surface-2);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .oura-today-stat.highlight {
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .oura-today-icon {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .oura-today-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .oura-today-value {
            font-family: 'Space Mono', monospace;
            font-size: 24px;
            font-weight: 700;
        }

        .oura-today-value.sleep { color: var(--blue); }
        .oura-today-value.calories { color: var(--green); }
        .oura-today-value.readiness { color: var(--purple); }
        .oura-today-value.hrv { color: var(--cyan); }
        .oura-today-value.steps { color: var(--orange); }
        .oura-today-value.activity { color: var(--orange); }
        .oura-today-value.temp { color: var(--red); }

        .oura-today-sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .oura-today-change {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            margin-top: 6px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .oura-today-change.positive {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .oura-today-change.negative {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
        }

        .oura-today-change.neutral {
            background: rgba(125, 133, 144, 0.15);
            color: var(--text-dim);
        }

        /* Sleep Details */
        .sleep-details {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .sleep-detail-section {
            background: var(--surface-2);
            border-radius: 8px;
            padding: 16px;
        }

        .sleep-detail-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sleep-detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .sleep-detail-label {
            font-size: 13px;
            color: var(--text-dim);
        }

        .sleep-detail-value {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 500;
        }

        .sleep-stages-bar {
            display: flex;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }

        .sleep-stage {
            transition: width 0.3s ease;
        }

        .sleep-stage.deep {
            background: var(--purple);
        }

        .sleep-stage.rem {
            background: var(--blue);
        }

        .sleep-stage.light {
            background: var(--cyan);
            opacity: 0.6;
        }

        .sleep-stages-legend {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 11px;
        }

        .sleep-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-dim);
        }

        .sleep-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        .sleep-legend-dot.deep { background: var(--purple); }
        .sleep-legend-dot.rem { background: var(--blue); }
        .sleep-legend-dot.light { background: var(--cyan); opacity: 0.6; }

        .stress-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .stress-indicator.normal {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .stress-indicator.high {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
        }

        /* Body Comp Sidebar */
        .body-comp {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .body-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .body-stat:last-child {
            border-bottom: none;
        }

        .body-stat-label {
            font-size: 13px;
            color: var(--text-dim);
        }

        .body-stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
        }

        .visceral-highlight {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 8px;
        }

        .visceral-highlight .body-stat-value {
            color: var(--red);
        }

        .visceral-target {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Today's Guide */
        .guide-card {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.1) 0%, var(--surface) 100%);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .guide-phase {
            font-size: 18px;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 12px;
        }

        .guide-section {
            margin-bottom: 16px;
        }

        .guide-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .guide-section-content {
            font-size: 14px;
            line-height: 1.5;
        }

        /* Electrolytes */
        .electrolytes-section {
            background: var(--surface-2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        .electrolytes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .electrolyte-item {
            text-align: center;
        }

        .electrolyte-label {
            display: block;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .electrolyte-value {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: var(--cyan);
            margin-top: 4px;
        }

        .electrolyte-note {
            font-size: 12px;
            color: var(--text-dim);
            font-style: italic;
            line-height: 1.4;
        }

        /* Log Section */
        .log-section {
            margin-top: 24px;
        }

        .log-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .log-entries {
        }

        .log-entry {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-date {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .log-day {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            background: var(--surface-2);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .log-type {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .log-type.event {
            background: rgba(163, 113, 247, 0.15);
            color: var(--purple);
        }

        .log-type.observation {
            background: rgba(57, 197, 207, 0.15);
            color: var(--cyan);
        }

        .log-type.sleep {
            background: rgba(88, 166, 255, 0.15);
            color: var(--blue);
        }

        .log-message {
            font-size: 13px;
            line-height: 1.4;
            flex: 1;
        }

        /* Day Guide Timeline */
        .day-timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .timeline-day {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .timeline-day.current {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        .timeline-day.past {
            opacity: 0.6;
        }

        .timeline-day.future {
            opacity: 0.4;
        }

        .timeline-num {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
            border-radius: 50%;
        }

        .timeline-day.current .timeline-num {
            background: var(--blue);
            color: var(--bg);
        }

        .timeline-day.past .timeline-num {
            background: var(--green);
            color: var(--bg);
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-phase {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .timeline-expect {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.4;
        }

        /* Electrolyte Popup */
        .timeline-day {
            cursor: pointer;
        }

        .electrolyte-popup {
            display: none;
            position: fixed;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            min-width: 240px;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .popup-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--cyan);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .popup-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
        }

        .popup-row span:first-child {
            color: var(--text-dim);
        }

        .popup-row span:last-child {
            font-weight: 600;
            font-size: 15px;
        }

        .popup-note {
            font-size: 11px;
            color: var(--text-dim);
            font-style: italic;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            line-height: 1.4;
        }

        /* Progress bar */
        .progress-container {
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 8px;
            background: var(--surface-2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--cyan));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="header-left">
                <h1>Fast Tracker</h1>
                <p>10-Day Protocol • Jan 1–11, 2026</p>
            </div>
            <div class="header-right">
                <div class="day-badge" id="dayBadge">Day 2 of 10</div>
                <div class="phase-badge" id="phaseBadge">PHASE: TRANSITION</div>
            </div>
        </header>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 20%"></div>
            </div>
            <div class="progress-labels">
                <span>Jan 1</span>
                <span id="elapsedTime">36 hours elapsed</span>
                <span>Jan 11</span>
            </div>
        </div>

        <div class="stats-row" id="statsRow">
            <!-- Populated by JS -->
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <div class="card-header">
                <span class="card-title">Weight (kg)</span>
                <span class="card-badge">DAILY AM</span>
            </div>
            <div class="weight-chart" id="weightChart">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <div class="card-header">
                <span class="card-title">Today's Oura Stats</span>
                <span class="card-badge" id="ouraDateBadge">JAN 3</span>
            </div>
            <div class="oura-today-grid" id="ouraTodayStats">
                <!-- Populated by JS -->
            </div>
            <div class="sleep-details" id="sleepDetails">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <div class="card-header">
                <span class="card-title">Oura Trends</span>
                <span class="card-badge">DAILY TRACKING</span>
            </div>
            <div id="ouraChart">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Body Composition</span>
                    <span class="card-badge">SCAN JAN 3</span>
                </div>
                <div class="body-comp" id="bodyComp">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="card guide-card">
                <div class="card-header">
                    <span class="card-title">Today's Guide</span>
                    <span class="card-badge" id="guideDayBadge">DAY 2</span>
                </div>
                <div id="guideContent">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <div class="log-section">
            <div class="log-grid">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">Activity Log</span>
                    </div>
                    <div class="log-entries" id="logEntries">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-title">10-Day Guide</span>
                    </div>
                    <div class="day-timeline" id="dayTimeline">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = null;

        async function loadData() {
            try {
                const response = await fetch('data.json');
                data = await response.json();
                renderDashboard();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function getCurrentDay() {
            if (!data || !data.measurements.length) return 1;
            return data.measurements[data.measurements.length - 1].day;
        }

        function renderDashboard() {
            const currentDay = getCurrentDay();
            const latestMeasurement = data.measurements[data.measurements.length - 1];
            const firstMeasurement = data.measurements[0];
            const guide = data.day_guide[currentDay.toString()];

            // Update header
            document.getElementById('dayBadge').textContent = `Day ${currentDay} of 10`;
            document.getElementById('phaseBadge').textContent = `PHASE: ${guide?.phase?.toUpperCase() || 'FASTING'}`;
            document.getElementById('progressFill').style.width = `${(currentDay / 10) * 100}%`;
            document.getElementById('guideDayBadge').textContent = `DAY ${currentDay}`;

            // Calculate elapsed time
            const start = new Date(data.fast.start);
            const now = new Date(latestMeasurement.date + 'T12:00:00');
            const hours = Math.floor((now - start) / (1000 * 60 * 60));
            document.getElementById('elapsedTime').textContent = `~${hours} hours elapsed`;

            // Stats row
            renderStats(latestMeasurement, firstMeasurement);

            // Weight chart
            renderWeightChart();

            // Today's guide
            renderGuide(guide, currentDay);

            // Today's Oura stats
            renderOuraTodayStats();

            // Oura chart
            renderOuraChart();

            // Body composition
            renderBodyComp();

            // Log entries
            renderLog();

            // Day timeline
            renderTimeline(currentDay);
        }

        function renderStats(latest, first) {
            const totalChange = latest.weight_kg - first.weight_kg;
            const html = `
                <div class="stat-card">
                    <div class="stat-label">Current Weight</div>
                    <div class="stat-value">${latest.weight_kg}<span class="stat-unit"> kg</span></div>
                    <div class="stat-change positive">↓ ${Math.abs(totalChange).toFixed(1)} kg total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Sleep Score</div>
                    <div class="stat-value">${latest.oura.sleep_score || '—'}</div>
                    <div class="stat-change ${getScoreClass(latest.oura.sleep_score)}">${getScoreLabel(latest.oura.sleep_score)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Readiness</div>
                    <div class="stat-value">${latest.oura.readiness_score || '—'}</div>
                    <div class="stat-change ${getScoreClass(latest.oura.readiness_score)}">${getScoreLabel(latest.oura.readiness_score)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Calories Burned</div>
                    <div class="stat-value">${latest.oura.total_calories?.toLocaleString() || '—'}</div>
                    ${latest.oura.total_calories ? `<div class="stat-change positive">↑ ${((latest.oura.total_calories / data.baseline.avg_total_calories - 1) * 100).toFixed(0)}% vs baseline</div>` : ''}
                </div>
            `;
            document.getElementById('statsRow').innerHTML = html;
        }

        function getScoreClass(score) {
            if (!score) return 'neutral';
            if (score >= 70) return 'positive';
            if (score >= 50) return 'neutral';
            return 'negative';
        }

        function getScoreLabel(score) {
            if (!score) return 'Pending';
            if (score >= 85) return 'Excellent';
            if (score >= 70) return 'Good';
            if (score >= 50) return 'Fair';
            return 'Low';
        }

        function renderWeightChart() {
            const measurements = data.measurements;
            const weights = measurements.map(m => m.weight_kg);
            const maxWeight = Math.max(...weights);
            const minWeight = Math.min(...weights) - 2;
            const range = maxWeight - minWeight;

            let barsHtml = '';

            // Actual data
            measurements.forEach((m, i) => {
                const height = ((m.weight_kg - minWeight) / range) * 100;
                const isLatest = i === measurements.length - 1;
                barsHtml += `
                    <div class="chart-bar-wrapper">
                        <div class="chart-value">${m.weight_kg}</div>
                        <div class="chart-bar ${isLatest ? 'active' : ''}" style="height: ${height}%"></div>
                        <div class="chart-label">Day ${m.day}</div>
                    </div>
                `;
            });

            // Projected days
            const lastWeight = weights[weights.length - 1];
            const avgLoss = measurements.length > 1 ? (weights[0] - lastWeight) / (measurements.length - 1) : 0.5;

            for (let day = getCurrentDay() + 1; day <= 10; day++) {
                const projectedWeight = lastWeight - (avgLoss * (day - getCurrentDay()));
                const height = ((projectedWeight - minWeight) / range) * 100;
                barsHtml += `
                    <div class="chart-bar-wrapper">
                        <div class="chart-value" style="opacity: 0.4">~${projectedWeight.toFixed(1)}</div>
                        <div class="chart-bar projected" style="height: ${Math.max(height, 10)}%"></div>
                        <div class="chart-label">Day ${day}</div>
                    </div>
                `;
            }

            document.getElementById('weightChart').innerHTML = `
                <div class="chart-container">${barsHtml}</div>
            `;
        }

        function renderGuide(guide, day) {
            if (!guide) return;

            let electrolyteHtml = '';
            if (guide.electrolytes) {
                const e = guide.electrolytes;
                electrolyteHtml = `
                    <div class="guide-section electrolytes-section">
                        <div class="guide-section-title">Daily Electrolytes</div>
                        <div class="electrolytes-grid">
                            <div class="electrolyte-item">
                                <span class="electrolyte-label">Sodium</span>
                                <span class="electrolyte-value">${e.sodium}</span>
                            </div>
                            <div class="electrolyte-item">
                                <span class="electrolyte-label">Potassium</span>
                                <span class="electrolyte-value">${e.potassium}</span>
                            </div>
                            <div class="electrolyte-item">
                                <span class="electrolyte-label">Magnesium</span>
                                <span class="electrolyte-value">${e.magnesium}</span>
                            </div>
                        </div>
                        <div class="electrolyte-note">${e.note}</div>
                    </div>
                `;
            }

            document.getElementById('guideContent').innerHTML = `
                <div class="guide-phase">${guide.phase}</div>
                <div class="guide-section">
                    <div class="guide-section-title">What to Expect</div>
                    <div class="guide-section-content">${guide.expect}</div>
                </div>
                <div class="guide-section">
                    <div class="guide-section-title">Tips</div>
                    <div class="guide-section-content">${guide.tips}</div>
                </div>
                ${electrolyteHtml}
            `;
        }

        function renderOuraTodayStats() {
            const measurements = data.measurements;
            const latest = measurements[measurements.length - 1];
            const previous = measurements.length > 1 ? measurements[measurements.length - 2] : null;
            const baseline = data.baseline;

            // Update date badge
            const latestDate = new Date(latest.date);
            document.getElementById('ouraDateBadge').textContent = latestDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();

            const stats = [
                {
                    label: 'Sleep',
                    value: latest.oura.sleep_score,
                    class: 'sleep',
                    prevValue: previous?.oura.sleep_score,
                    unit: '',
                    format: v => v
                },
                {
                    label: 'Readiness',
                    value: latest.oura.readiness_score,
                    class: 'readiness',
                    prevValue: previous?.oura.readiness_score,
                    unit: '',
                    format: v => v
                },
                {
                    label: 'Calories',
                    value: latest.oura.total_calories,
                    class: 'calories',
                    baselineValue: baseline.avg_total_calories,
                    unit: '',
                    format: v => v?.toLocaleString(),
                    highlight: true
                },
                {
                    label: 'Steps',
                    value: latest.oura.steps,
                    class: 'steps',
                    baselineValue: baseline.avg_steps,
                    unit: '',
                    format: v => v?.toLocaleString()
                },
                {
                    label: 'HRV',
                    value: latest.oura.hrv_balance,
                    class: 'hrv',
                    prevValue: previous?.oura.hrv_balance,
                    unit: '%',
                    format: v => v
                },
                {
                    label: 'Body Temp',
                    value: latest.oura.body_temp_deviation,
                    class: 'temp',
                    prevValue: previous?.oura.body_temp_deviation,
                    unit: '°C',
                    format: v => v !== null && v !== undefined ? (v >= 0 ? '+' : '') + v.toFixed(2) : null
                }
            ];

            let html = '';
            stats.forEach(stat => {
                const displayValue = stat.value !== null && stat.value !== undefined ? stat.format(stat.value) : '—';
                let changeHtml = '';

                if (stat.prevValue !== undefined && stat.value !== null && stat.prevValue !== null) {
                    const diff = stat.value - stat.prevValue;
                    if (diff !== 0) {
                        const sign = diff > 0 ? '↑' : '↓';
                        const cls = stat.class === 'temp'
                            ? (diff > 0 ? 'negative' : 'positive')
                            : (diff > 0 ? 'positive' : 'negative');
                        changeHtml = `<div class="oura-today-change ${cls}">${sign} ${Math.abs(diff).toFixed(stat.class === 'temp' ? 2 : 0)}</div>`;
                    }
                } else if (stat.baselineValue && stat.value !== null) {
                    const pctDiff = ((stat.value / stat.baselineValue) - 1) * 100;
                    if (Math.abs(pctDiff) >= 1) {
                        const sign = pctDiff > 0 ? '↑' : '↓';
                        const cls = pctDiff > 0 ? 'positive' : 'negative';
                        changeHtml = `<div class="oura-today-change ${cls}">${sign} ${Math.abs(pctDiff).toFixed(0)}% vs baseline</div>`;
                    }
                }

                html += `
                    <div class="oura-today-stat ${stat.highlight ? 'highlight' : ''}">
                        <div class="oura-today-label">${stat.label}</div>
                        <div class="oura-today-value ${stat.class}">${displayValue}${stat.unit && displayValue !== '—' ? stat.unit : ''}</div>
                        ${changeHtml}
                    </div>
                `;
            });

            document.getElementById('ouraTodayStats').innerHTML = html;

            // Render sleep details
            renderSleepDetails(latest);
        }

        function renderSleepDetails(measurement) {
            const sleep = measurement.oura.sleep;
            const stress = measurement.oura.stress;

            if (!sleep && !stress) {
                document.getElementById('sleepDetails').innerHTML = '';
                return;
            }

            let html = '';

            // Sleep section
            if (sleep) {
                const totalMins = sleep.deep_mins + sleep.rem_mins + sleep.light_mins;
                const deepPct = (sleep.deep_mins / totalMins * 100).toFixed(0);
                const remPct = (sleep.rem_mins / totalMins * 100).toFixed(0);
                const lightPct = (sleep.light_mins / totalMins * 100).toFixed(0);

                const formatTime = (isoStr) => {
                    if (!isoStr) return '—';
                    const date = new Date(isoStr);
                    return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                };

                html += `
                    <div class="sleep-detail-section">
                        <div class="sleep-detail-title">Sleep Timeline</div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">Bedtime</span>
                            <span class="sleep-detail-value">${formatTime(sleep.bedtime)}</span>
                        </div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">Wake time</span>
                            <span class="sleep-detail-value">${formatTime(sleep.wake_time)}</span>
                        </div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">Total sleep</span>
                            <span class="sleep-detail-value">${sleep.total_hours.toFixed(1)} hrs</span>
                        </div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">Efficiency</span>
                            <span class="sleep-detail-value">${sleep.efficiency}%</span>
                        </div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">Lowest HR</span>
                            <span class="sleep-detail-value">${sleep.lowest_hr || '—'} bpm</span>
                        </div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">Avg HRV</span>
                            <span class="sleep-detail-value">${sleep.avg_hrv || '—'} ms</span>
                        </div>
                        <div class="sleep-stages-bar">
                            <div class="sleep-stage deep" style="width: ${deepPct}%"></div>
                            <div class="sleep-stage rem" style="width: ${remPct}%"></div>
                            <div class="sleep-stage light" style="width: ${lightPct}%"></div>
                        </div>
                        <div class="sleep-stages-legend">
                            <span class="sleep-legend-item"><span class="sleep-legend-dot deep"></span>Deep ${sleep.deep_mins}m</span>
                            <span class="sleep-legend-item"><span class="sleep-legend-dot rem"></span>REM ${sleep.rem_mins}m</span>
                            <span class="sleep-legend-item"><span class="sleep-legend-dot light"></span>Light ${sleep.light_mins}m</span>
                        </div>
                    </div>
                `;
            }

            // Stress section
            if (stress) {
                html += `
                    <div class="sleep-detail-section">
                        <div class="sleep-detail-title">Stress & Recovery</div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">Day Summary</span>
                            <span class="stress-indicator ${stress.summary}">${stress.summary}</span>
                        </div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">High Stress</span>
                            <span class="sleep-detail-value">${stress.stress_mins} mins</span>
                        </div>
                        <div class="sleep-detail-row">
                            <span class="sleep-detail-label">High Recovery</span>
                            <span class="sleep-detail-value">${stress.recovery_mins} mins</span>
                        </div>
                        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">
                            <div class="sleep-detail-row">
                                <span class="sleep-detail-label">Recovery/Stress Ratio</span>
                                <span class="sleep-detail-value" style="color: ${stress.recovery_mins >= stress.stress_mins ? 'var(--green)' : 'var(--red)'}">
                                    ${(stress.recovery_mins / Math.max(stress.stress_mins, 1)).toFixed(1)}x
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('sleepDetails').innerHTML = html;
        }

        function renderOuraChart() {
            const measurements = data.measurements;
            const latest = measurements[measurements.length - 1];

            // Define chart series - each gets its own chart
            const charts = [
                { key: 'sleep_score', label: 'Sleep Score', class: 'sleep', min: 0, max: 100, unit: '', primary: true },
                { key: 'total_calories', label: 'Calories Burned', class: 'calories', min: 1500, max: 3500, unit: '', primary: true },
                { key: 'readiness_score', label: 'Readiness', class: 'readiness', min: 0, max: 100, unit: '' },
                { key: 'hrv_balance', label: 'HRV Balance', class: 'hrv', min: 0, max: 100, unit: '%' },
                { key: 'steps', label: 'Steps', class: 'steps', min: 0, max: 10000, unit: '' }
            ];

            let html = '<div class="oura-charts-grid">';

            charts.forEach(chart => {
                const hasData = measurements.some(m => m.oura[chart.key] !== null && m.oura[chart.key] !== undefined);
                const latestValue = latest.oura[chart.key];

                html += `
                    <div class="oura-mini-chart ${chart.primary ? 'primary' : ''}">
                        <div class="mini-chart-header">
                            <div class="mini-chart-label">
                                <span class="legend-dot ${chart.class}"></span>
                                ${chart.label}
                            </div>
                            <div class="mini-chart-value ${chart.class}">${latestValue !== null && latestValue !== undefined ? (chart.key === 'total_calories' || chart.key === 'steps' ? latestValue.toLocaleString() : latestValue) : '—'}${chart.unit}</div>
                        </div>
                        ${renderMiniLineChart(chart, measurements)}
                    </div>
                `;
            });

            html += '</div>';
            document.getElementById('ouraChart').innerHTML = html;
        }

        function renderMiniLineChart(chart, measurements) {
            const chartWidth = 300;
            const chartHeight = 80;
            const padding = { top: 10, right: 10, bottom: 25, left: 40 };
            const innerWidth = chartWidth - padding.left - padding.right;
            const innerHeight = chartHeight - padding.top - padding.bottom;

            // Get date range for x-axis (Jan 2 to Jan 11)
            const startDate = new Date('2026-01-02');
            const endDate = new Date('2026-01-11');
            const totalDays = 10;
            const dayWidth = innerWidth / (totalDays - 1);

            // Calculate Y axis ticks based on chart type
            let yTicks;
            if (chart.max === 100) {
                yTicks = [0, 50, 100];
            } else if (chart.key === 'total_calories') {
                yTicks = [1500, 2500, 3500];
            } else if (chart.key === 'steps') {
                yTicks = [0, 5000, 10000];
            } else {
                yTicks = [chart.min, (chart.min + chart.max) / 2, chart.max];
            }

            // Collect data points
            const points = [];
            measurements.forEach(m => {
                const value = m.oura[chart.key];
                if (value !== null && value !== undefined) {
                    const date = new Date(m.date);
                    const dayIndex = Math.round((date - startDate) / (1000 * 60 * 60 * 24));
                    const x = dayIndex * dayWidth;
                    const normalizedValue = Math.max(0, Math.min(1, (value - chart.min) / (chart.max - chart.min)));
                    const y = innerHeight - (normalizedValue * innerHeight);
                    points.push({ x, y, value, date: m.date });
                }
            });

            let svg = `
                <svg class="mini-line-chart" viewBox="0 0 ${chartWidth} ${chartHeight}" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="${chart.class}AreaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" class="gradient-stop-${chart.class}" style="stop-opacity:0.3" />
                            <stop offset="100%" class="gradient-stop-${chart.class}" style="stop-opacity:0" />
                        </linearGradient>
                    </defs>
                    <g transform="translate(${padding.left}, ${padding.top})">
                        <!-- Y-axis grid lines and labels -->
                        ${yTicks.map(v => {
                            const normalizedV = (v - chart.min) / (chart.max - chart.min);
                            const y = innerHeight - (normalizedV * innerHeight);
                            return `
                                <line class="chart-grid-line" x1="0" y1="${y}" x2="${innerWidth}" y2="${y}"/>
                                <text class="chart-axis-label" x="-6" y="${y + 3}" text-anchor="end">${chart.key === 'steps' ? (v/1000) + 'k' : v}</text>
                            `;
                        }).join('')}

                        <!-- X-axis date labels -->
                        ${measurements.map(m => {
                            const date = new Date(m.date);
                            const dayIndex = Math.round((date - startDate) / (1000 * 60 * 60 * 24));
                            const x = dayIndex * dayWidth;
                            const dateLabel = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                            return `<text class="chart-axis-label" x="${x}" y="${innerHeight + 16}" text-anchor="middle">${dateLabel}</text>`;
                        }).join('')}
            `;

            if (points.length > 0) {
                // Area fill for primary charts
                if (chart.primary && points.length > 1) {
                    const areaPath = `M ${points[0].x} ${innerHeight} ` +
                        points.map(p => `L ${p.x} ${p.y}`).join(' ') +
                        ` L ${points[points.length - 1].x} ${innerHeight} Z`;
                    svg += `<path class="chart-area ${chart.class}" d="${areaPath}" fill="url(#${chart.class}AreaGradient)"/>`;
                }

                // Line
                if (points.length > 1) {
                    const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                    svg += `<path class="chart-line ${chart.primary ? 'primary' : ''} ${chart.class}" d="${linePath}"/>`;
                }

                // Dots with value labels
                points.forEach((p, i) => {
                    svg += `<circle class="chart-dot ${chart.class}" cx="${p.x}" cy="${p.y}" r="${chart.primary ? 5 : 4}"/>`;
                    // Show value above dot
                    const displayValue = chart.key === 'total_calories' || chart.key === 'steps' ? Math.round(p.value).toLocaleString() : p.value;
                    svg += `<text class="chart-value-label" x="${p.x}" y="${p.y - 8}" text-anchor="middle">${displayValue}</text>`;
                });
            }

            svg += `
                    </g>
                </svg>
            `;

            return svg;
        }

        function renderBodyComp() {
            const comp = data.body_composition[0];
            if (!comp) {
                document.getElementById('bodyComp').innerHTML = '<p style="color: var(--text-dim);">No body scan data yet</p>';
                return;
            }

            document.getElementById('bodyComp').innerHTML = `
                <div class="visceral-highlight">
                    <div class="body-stat" style="border: none; padding: 0;">
                        <span class="body-stat-label">Visceral Fat</span>
                        <span class="body-stat-value">${comp.visceral_fat_lbs} lbs</span>
                    </div>
                    <div class="visceral-target">${(comp.visceral_fat_lbs / comp.visceral_fat_target_lbs).toFixed(1)}× over target (${comp.visceral_fat_target_lbs} lb)</div>
                </div>
                <div class="body-stat">
                    <span class="body-stat-label">Body Fat</span>
                    <span class="body-stat-value">${comp.body_fat_pct}%</span>
                </div>
                <div class="body-stat">
                    <span class="body-stat-label">Lean Mass</span>
                    <span class="body-stat-value">${comp.lean_mass_lbs} lbs</span>
                </div>
                <div class="body-stat">
                    <span class="body-stat-label">Total Mass</span>
                    <span class="body-stat-value">${comp.total_mass_lbs} lbs</span>
                </div>
                <div class="body-stat">
                    <span class="body-stat-label">T-Score</span>
                    <span class="body-stat-value">${comp.t_score}</span>
                </div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 8px;">
                    Next scan: Jan 11
                </div>
            `;
        }

        function renderLog() {
            const logs = [...data.log].reverse();
            let html = '';

            logs.forEach(entry => {
                html += `
                    <div class="log-entry">
                        <div style="display: flex; flex-direction: column; gap: 4px;">
                            <span class="log-date">${formatDate(entry.date)}</span>
                            <span class="log-day">Day ${entry.day}</span>
                        </div>
                        <div style="flex: 1;">
                            <span class="log-type ${entry.type}">${entry.type}</span>
                            <div class="log-message" style="margin-top: 6px;">${entry.message}</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('logEntries').innerHTML = html;
        }

        function renderTimeline(currentDay) {
            let html = '';

            for (let day = 1; day <= 10; day++) {
                const guide = data.day_guide[day.toString()];
                let statusClass = 'future';
                if (day < currentDay) statusClass = 'past';
                if (day === currentDay) statusClass = 'current';

                let electrolyteData = '';
                if (guide?.electrolytes) {
                    const e = guide.electrolytes;
                    electrolyteData = `data-electrolytes="${encodeURIComponent(JSON.stringify({day, ...e}))}"`;
                }

                html += `
                    <div class="timeline-day ${statusClass}" ${electrolyteData}>
                        <div class="timeline-num">${day}</div>
                        <div class="timeline-content">
                            <div class="timeline-phase">${guide?.phase || ''}</div>
                            <div class="timeline-expect">${guide?.expect || ''}</div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('dayTimeline').innerHTML = html;

            // Add hover listeners for electrolyte popups
            document.querySelectorAll('.timeline-day[data-electrolytes]').forEach(el => {
                el.addEventListener('mouseenter', showElectrolytePopup);
                el.addEventListener('mouseleave', hideElectrolytePopup);
            });
        }

        function showElectrolytePopup(e) {
            const data = JSON.parse(decodeURIComponent(e.currentTarget.dataset.electrolytes));

            let popup = document.getElementById('electrolytePopup');
            if (!popup) {
                popup = document.createElement('div');
                popup.id = 'electrolytePopup';
                popup.className = 'electrolyte-popup';
                document.body.appendChild(popup);
            }

            popup.innerHTML = `
                <div class="popup-title">Day ${data.day} Electrolytes</div>
                <div class="popup-row"><span>Sodium</span><span>${data.sodium}</span></div>
                <div class="popup-row"><span>Potassium</span><span>${data.potassium}</span></div>
                <div class="popup-row"><span>Magnesium</span><span>${data.magnesium}</span></div>
                <div class="popup-note">${data.note}</div>
            `;

            const rect = e.currentTarget.getBoundingClientRect();
            popup.style.display = 'block';
            popup.style.left = (rect.left - popup.offsetWidth - 12) + 'px';
            popup.style.top = rect.top + 'px';
        }

        function hideElectrolytePopup() {
            const popup = document.getElementById('electrolytePopup');
            if (popup) popup.style.display = 'none';
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Load data on page load
        loadData();

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
