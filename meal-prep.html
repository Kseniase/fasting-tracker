<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Prep</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --blue: #58a6ff;
            --purple: #a371f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 24px;
            min-height: 100vh;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-left p {
            color: var(--text-dim);
            font-size: 14px;
        }

        nav { display: flex; gap: 8px; margin-bottom: 24px; }
        nav a {
            padding: 8px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        nav a:hover { background: var(--surface); color: var(--text); }
        nav a.active { background: var(--blue); color: var(--bg); border-color: var(--blue); }

        .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: var(--blue); }
        .card h3 { font-size: 15px; margin: 16px 0 12px 0; color: var(--text); }

        /* Shopping List */
        .shopping-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .shopping-category h3 {
            font-size: 14px;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .shopping-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 14px;
            cursor: pointer;
        }
        .shopping-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--green); }
        .shopping-item.checked label { text-decoration: line-through; color: var(--text-dim); }

        /* Cooking Timeline */
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .timeline-item { position: relative; margin-bottom: 24px; }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--blue);
        }
        .timeline-time { font-size: 12px; color: var(--blue); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
        .timeline-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .timeline-tasks { background: var(--surface-2); border-radius: 6px; padding: 12px 16px; }
        .timeline-tasks ul { margin: 0; padding-left: 20px; }
        .timeline-tasks li { margin-bottom: 6px; font-size: 14px; }
        .timeline-tasks li:last-child { margin-bottom: 0; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .results-grid h3 { margin-bottom: 8px; }
        .results-grid ul { padding-left: 20px; font-size: 14px; }

        /* Gantt Timeline */
        .gantt-container { overflow-x: auto; margin-bottom: 16px; }
        .gantt-chart { min-width: 700px; }
        .gantt-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .gantt-label-col { width: 110px; flex-shrink: 0; font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .gantt-timeline-col { flex: 1; display: flex; }
        .gantt-hour {
            flex: 1;
            text-align: center;
            font-size: 10px;
            color: var(--text-dim);
            border-left: 1px solid var(--border);
            padding: 4px 0;
        }
        .gantt-hour:first-child { border-left: none; }
        .gantt-row { display: flex; align-items: center; height: 32px; margin-bottom: 2px; }
        .gantt-row-label { width: 110px; flex-shrink: 0; font-size: 12px; font-weight: 500; padding-right: 8px; }
        .gantt-row-bars { flex: 1; position: relative; height: 24px; }
        .gantt-bar {
            position: absolute;
            height: 20px;
            border-radius: 3px;
            font-size: 9px;
            color: var(--bg);
            display: flex;
            align-items: center;
            padding: 0 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
            font-weight: 500;
        }
        .gantt-bar.oven1 { background: var(--red); }
        .gantt-bar.oven2 { background: #f97316; }
        .gantt-bar.stovetop { background: var(--yellow); }
        .gantt-bar.slow_cooker { background: var(--purple); }
        .gantt-bar.air_fryer { background: var(--blue); }
        .gantt-bar.prep { background: var(--green); }
        .gantt-bar.assembly { background: #14b8a6; }
        .gantt-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .gantt-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
        .gantt-legend-color { width: 12px; height: 12px; border-radius: 2px; }

        @media (max-width: 600px) {
            .shopping-grid { grid-template-columns: 1fr; }
            .tabs { overflow-x: auto; }
            .tab { padding: 12px 16px; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="header-left">
                <h1>Meal Prep</h1>
                <p>Sunday batch cooking and shopping list</p>
            </div>
        </header>

        <nav>
        <a href="index.html">Fasting Tracker</a>
        <a href="fasting-info.html">Fasting Information</a>
        <a href="meal-prep.html" class="active">Meal Prep</a>
        <a href="menu.html">Menu</a>
    </nav>

    <div class="tabs">
        <button class="tab active" onclick="showTab('cooking')">Cooking Guide</button>
        <button class="tab" onclick="showTab('shopping')">Shopping List</button>
    </div>

    <!-- SUNDAY COOKING TAB -->
    <div id="tab-cooking" class="tab-content active">
        <div class="card">
            <h2>Sunday Batch Prep</h2>
            <div id="cooking-overview" style="margin-bottom: 24px;">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="card">
            <h2>Equipment Timeline</h2>
            <p style="color: var(--text-dim); margin-bottom: 12px; font-size: 13px;">What's running when - hover for details</p>
            <div id="gantt-chart" class="gantt-container">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="card">
            <h2>Step-by-Step Instructions</h2>
            <div id="cooking-timeline" class="timeline">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="card">
            <h2>Quick Timeline Summary</h2>
            <ul id="cooking-notes" style="padding-left: 20px; font-size: 14px; line-height: 1.8;">
                <!-- Populated by JS -->
            </ul>
        </div>

        <div class="card">
            <h2>What You'll Have Ready</h2>
            <div id="cooking-results" class="results-grid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- SHOPPING LIST TAB -->
    <div id="tab-shopping" class="tab-content">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0;">Weekly Shopping List</h2>
                <button onclick="resetShopping()" style="background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;">Reset All</button>
            </div>
            <div id="shopping-grid" class="shopping-grid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        let data = null;

        // Load data from JSON
        async function loadData() {
            try {
                const response = await fetch('recipes.json');
                data = await response.json();
                renderShopping();
                renderCooking();
                loadShoppingState();
            } catch (error) {
                console.error('Error loading recipes.json:', error);
            }
        }

        // Tab switching
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // ============================================
        // SHOPPING LIST
        // ============================================
        function renderShopping() {
            const grid = document.getElementById('shopping-grid');
            const categories = {
                proteins: 'Proteins',
                vegetables: 'Vegetables',
                fresh: 'Fresh / Snacking',
                dairy: 'Dairy & Fats',
                pantry: 'Pantry Items',
                fresh_additions: 'Fresh (buy day-of salmon/steak)'
            };

            grid.innerHTML = Object.entries(categories).map(([key, label]) => `
                <div class="shopping-category">
                    <h3>${label}</h3>
                    ${data.shopping[key].map((item, i) => `
                        <div class="shopping-item" data-key="${key}-${i}" onclick="toggleItem(this)">
                            <input type="checkbox"><label>${item}</label>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function toggleItem(el) {
            const checkbox = el.querySelector('input');
            checkbox.checked = !checkbox.checked;
            el.classList.toggle('checked', checkbox.checked);
            saveShoppingState();
        }

        function saveShoppingState() {
            const state = {};
            document.querySelectorAll('.shopping-item').forEach(item => {
                state[item.dataset.key] = item.classList.contains('checked');
            });
            localStorage.setItem('shoppingList', JSON.stringify(state));
        }

        function loadShoppingState() {
            const state = JSON.parse(localStorage.getItem('shoppingList') || '{}');
            document.querySelectorAll('.shopping-item').forEach(item => {
                if (state[item.dataset.key]) {
                    item.classList.add('checked');
                    item.querySelector('input').checked = true;
                }
            });
        }

        function resetShopping() {
            document.querySelectorAll('.shopping-item').forEach(item => {
                item.classList.remove('checked');
                item.querySelector('input').checked = false;
            });
            localStorage.removeItem('shoppingList');
        }

        // ============================================
        // COOKING TIMELINE
        // ============================================
        function renderCooking() {
            // Overview
            const overview = document.getElementById('cooking-overview');
            const o = data.cooking.overview;
            const equipList = Object.entries(o.equipment).map(([k, v]) => `<strong>${k}:</strong> ${v}`).join('<br>');
            overview.innerHTML = `
                <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px;">
                    <div style="background: var(--surface-2); padding: 12px 16px; border-radius: 8px; flex: 1; min-width: 200px;">
                        <div style="color: var(--text-dim); font-size: 12px; text-transform: uppercase;">Total Time</div>
                        <div style="font-size: 16px; font-weight: 600;">${o.total_time}</div>
                    </div>
                    <div style="background: var(--surface-2); padding: 12px 16px; border-radius: 8px; flex: 1; min-width: 200px;">
                        <div style="color: var(--text-dim); font-size: 12px; text-transform: uppercase;">Concept</div>
                        <div style="font-size: 16px; font-weight: 600;">${o.concept}</div>
                    </div>
                </div>
                <div style="background: var(--surface-2); padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.8;">
                    <div style="color: var(--text-dim); font-size: 12px; text-transform: uppercase; margin-bottom: 8px;">Equipment Assignment</div>
                    ${equipList}
                </div>
            `;

            // Timeline (using steps array now)
            const timeline = document.getElementById('cooking-timeline');
            timeline.innerHTML = data.cooking.steps.map(step => `
                <div class="timeline-item">
                    <div class="timeline-time">${step.time} - Step ${step.step}</div>
                    <div class="timeline-title">
                        ${step.title}
                        <span style="font-weight: normal; font-size: 12px; color: var(--green); margin-left: 8px;">${step.duration}</span>
                    </div>
                    <div class="timeline-tasks">
                        <ul>
                            ${step.do.map(task => `<li>${task}</li>`).join('')}
                        </ul>
                    </div>
                    <div style="font-size: 12px; color: var(--text-dim); margin-top: 8px; font-style: italic;">
                        &rarr; ${step.status_after}
                    </div>
                </div>
            `).join('');

            // Timeline summary (replaces timing notes)
            const notes = document.getElementById('cooking-notes');
            notes.innerHTML = data.cooking.timeline_summary.map(note => `<li>${note}</li>`).join('');

            // Results
            const results = document.getElementById('cooking-results');
            const resultLabels = {
                grab_and_go: { label: 'Grab & Go Meals', color: 'var(--green)' },
                fresh_containers: { label: 'Fresh Add-On Containers', color: 'var(--yellow)' },
                fresh_cook: { label: 'Cook Fresh (Mid-Week)', color: 'var(--purple)' },
                extras: { label: 'Extras', color: 'var(--blue)' }
            };

            results.innerHTML = Object.entries(resultLabels).map(([key, config]) => `
                <div>
                    <h3 style="color: ${config.color};">${config.label}</h3>
                    <ul>
                        ${data.cooking.results[key].map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `).join('');

            // Render Gantt chart
            renderGanttChart();
        }

        // ============================================
        // GANTT CHART
        // ============================================
        function renderGanttChart() {
            const container = document.getElementById('gantt-chart');
            const startHour = 12, endHour = 17;
            const totalMinutes = (endHour - startHour) * 60;

            function timeToMinutes(t) {
                const [h, m] = t.split(':').map(Number);
                return (h - startHour) * 60 + m;
            }
            function getLeft(t) { return (timeToMinutes(t) / totalMinutes) * 100; }
            function getWidth(d) { return (d / totalMinutes) * 100; }

            const tasks = {
                'Oven #1 (300°F)': [
                    { start: '12:00', duration: 180, label: 'Pork Braise', type: 'oven1' }
                ],
                'Oven #2 (400°F)': [
                    { start: '12:15', duration: 45, label: 'Chicken', type: 'oven2' },
                    { start: '13:00', duration: 30, label: 'Broccoli/Brussels', type: 'oven2' },
                    { start: '13:30', duration: 25, label: 'Zucchini/Peppers', type: 'oven2' }
                ],
                'Stovetop': [
                    { start: '12:15', duration: 10, label: 'Boil Eggs', type: 'stovetop' },
                    { start: '13:15', duration: 15, label: 'Cauliflower', type: 'stovetop' },
                    { start: '13:30', duration: 10, label: 'Mash', type: 'stovetop' }
                ],
                'Slow Cooker': [
                    { start: '12:00', duration: 180, label: 'Beef Stew', type: 'slow_cooker' }
                ],
                'Air Fryer': [
                    { start: '12:25', duration: 12, label: 'Bacon', type: 'air_fryer' }
                ],
                'Prep (cutting)': [
                    { start: '12:00', duration: 15, label: 'Season meats', type: 'prep' },
                    { start: '12:35', duration: 5, label: 'Stew veg', type: 'prep' },
                    { start: '12:40', duration: 20, label: 'Cut veggies', type: 'prep' },
                    { start: '13:55', duration: 25, label: 'Fresh prep', type: 'prep' }
                ],
                'Assembly': [
                    { start: '15:00', duration: 30, label: 'Shred', type: 'assembly' },
                    { start: '15:30', duration: 30, label: 'Pack meals', type: 'assembly' },
                    { start: '16:00', duration: 20, label: 'Containers', type: 'assembly' },
                    { start: '16:20', duration: 25, label: 'Clean up', type: 'assembly' }
                ]
            };

            const hours = [];
            for (let h = startHour; h <= endHour; h++) {
                hours.push(`${h > 12 ? h - 12 : h}${h >= 12 ? 'PM' : 'AM'}`);
            }

            let html = `<div class="gantt-chart">
                <div class="gantt-header">
                    <div class="gantt-label-col"></div>
                    <div class="gantt-timeline-col">${hours.map(h => `<div class="gantt-hour">${h}</div>`).join('')}</div>
                </div>`;

            for (const [equip, items] of Object.entries(tasks)) {
                html += `<div class="gantt-row">
                    <div class="gantt-row-label">${equip}</div>
                    <div class="gantt-row-bars">`;
                for (const t of items) {
                    html += `<div class="gantt-bar ${t.type}" style="left:${getLeft(t.start)}%;width:${getWidth(t.duration)}%;" title="${t.label} (${t.duration} min)">${t.label}</div>`;
                }
                html += `</div></div>`;
            }

            html += `<div class="gantt-legend">
                <div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--red)"></div>Oven 1</div>
                <div class="gantt-legend-item"><div class="gantt-legend-color" style="background:#f97316"></div>Oven 2</div>
                <div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--yellow)"></div>Stovetop</div>
                <div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--purple)"></div>Slow Cooker</div>
                <div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--blue)"></div>Air Fryer</div>
                <div class="gantt-legend-item"><div class="gantt-legend-color" style="background:var(--green)"></div>Prep</div>
                <div class="gantt-legend-item"><div class="gantt-legend-color" style="background:#14b8a6"></div>Assembly</div>
            </div></div>`;

            container.innerHTML = html;
        }

        // Init
        loadData();
    </script>
    </div>
</body>
</html>
